<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente Clínico Móvil</title>
    <style>
        /* Mismo diseño que te gustó */
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #eef2f5; margin: 0; padding: 15px; display: flex; justify-content: center; color: #2c3e50;}
        .container { background-color: #ffffff; padding: 25px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); width: 100%; max-width: 500px; }
        
        h2 { color: #0056b3; text-align: center; margin-top: 0; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        h3 { color: #34495e; text-align: center; font-size: 18px; margin-top: 0;}
        
        .form-group { margin-bottom: 12px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        
        label { font-weight: 600; color: #5c6a79; font-size: 13px; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.5px;}
        input[type="text"], textarea { width: 100%; padding: 12px; border: 1.5px solid #dce4ec; border-radius: 10px; box-sizing: border-box; font-size: 15px; background-color: #fbfcff; transition: all 0.2s ease; }
        input[type="text"]:focus, textarea:focus { border-color: #0056b3; background-color: #ffffff; outline: none; box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1); }
        textarea { resize: vertical; min-height: 90px; }
        
        .btn-dictar { background-color: #e8f4fd; color: #0056b3; border: 1.5px solid #b8daff; padding: 12px; width: 100%; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 8px; transition: all 0.2s;}
        .btn-dictar:active { transform: scale(0.98); }
        .btn-dictar.grabando { background-color: #ffebeb; color: #d63031; border-color: #ffcccc; animation: pulse 1.5s infinite; }
        
        .btn-enviar { background-color: #0056b3; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 10px rgba(0, 86, 179, 0.2); transition: all 0.2s; }
        .btn-enviar:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(0, 86, 179, 0.2); }
        .btn-enviar:disabled { background-color: #95a5a6; box-shadow: none; cursor: not-allowed; }

        .historial-seccion { margin-top: 35px; border-top: 2px solid #ecf0f1; padding-top: 25px; }
        .tarjeta-pendiente { background-color: #ffffff; border: 1px solid #e1e8ed; border-left: 5px solid #e67e22; padding: 16px; margin-bottom: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: opacity 0.3s ease, transform 0.3s ease; }
        .tarjeta-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #ecf0f1; padding-bottom: 10px; margin-bottom: 10px; }
        .t-cama { font-size: 20px; font-weight: 800; color: #0056b3; display: flex; align-items: center; gap: 5px;}
        .t-paciente { font-size: 15px; color: #34495e; font-weight: 600; text-align: right;}
        
        .t-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .t-info { font-size: 13px; color: #5c6a79; background: #f8f9fa; padding: 8px; border-radius: 6px;}
        .t-info strong { color: #2c3e50; display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 2px;}
        
        .t-notas { font-size: 14px; color: #1a252f; background: #fffcf5; padding: 12px; border-radius: 8px; border-left: 3px solid #f1c40f; margin-top: 5px; line-height: 1.4;}
        
        .btn-resolver { background-color: #ffffff; color: #27ae60; border: 1.5px solid #2ecc71; padding: 10px; width: 100%; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 15px; transition: all 0.2s; }
        .btn-resolver:hover { background-color: #2ecc71; color: #ffffff; }
        .btn-resolver:active { transform: scale(0.98); }
        
        .btn-actualizar { background-color: transparent; color: #7f8c8d; border: 1px dashed #bdc3c7; padding: 10px; width: 100%; border-radius: 8px; font-size: 13px; cursor: pointer; margin-bottom: 20px; transition: all 0.2s;}
        .btn-actualizar:active { background-color: #f4f6f7; }
        
        .info-dictado { font-size: 11px; color: #7f8c8d; text-align: center; margin-top: 5px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 Nuevo Registro</h2>
    
    <div class="form-group full-width">
        <button id="btn-dictar" class="btn-dictar">🎙️ Dictado Inteligente (Autocompletar)</button>
        <div class="info-dictado">Di: "Cama...", "Paciente...", "Medicamento...", "Dosis...", "Horario...", "Pendientes..."</div>
    </div>

    <div class="grid-form">
        <div class="form-group">
            <label>Cama / Hab.</label>
            <input type="text" id="cama" placeholder="Ej. 302">
        </div>
        <div class="form-group">
            <label>Paciente</label>
            <input type="text" id="paciente" placeholder="Nombre">
        </div>
        <div class="form-group">
            <label>Medicamento</label>
            <input type="text" id="medicamento" placeholder="Ej. Ketorolaco">
        </div>
        <div class="form-group">
            <label>Dosis</label>
            <input type="text" id="dosis" placeholder="Ej. 30mg">
        </div>
        <div class="form-group full-width">
            <label>Horarios</label>
            <input type="text" id="horarios" placeholder="Ej. Cada 8 hrs (10:00, 18:00, 02:00)">
        </div>
        <div class="form-group full-width">
            <label>Notas Clínicas / Pendientes</label>
            <textarea id="pendientes" placeholder="Si no usas palabras clave, el dictado aparecerá aquí..."></textarea>
        </div>
    </div>

    <button id="btn-enviar" class="btn-enviar" onclick="enviarReporte()">Guardar en Expediente</button>

    <div class="historial-seccion">
        <h3>📋 Pendientes en Sala</h3>
        <button class="btn-actualizar" onclick="cargarPendientes(false)">↻ Sincronizar datos ahora</button>
        <div id="lista-pendientes">
            <p style="text-align:center; color:#7f8c8d; font-size: 14px;">Cargando sala...</p>
        </div>
    </div>
</div>

<script>
    const URL_GOOGLE = 'https://script.google.com/macros/s/AKfycbxHg3o72v1ol3E1WObJfqWn-GUkcW0UT-8hPiyyZ-sAh1ERdVujELF26kzi24hCiyVwNQ/exec';

    const btnDictar = document.getElementById('btn-dictar');
    let dictando = false;
    let textoAcumulado = ""; // Aquí guardaremos todo lo que hables

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.continuous = true; 
        recognition.interimResults = false; 
        recognition.lang = 'es-MX'; 
        
        recognition.onstart = function() {
            textoAcumulado = ""; // Limpia el texto anterior al empezar
        };

        recognition.onresult = event => {
            let fraseNueva = '';
            for (let i = event.resultIndex; i < event.results.length; i++) { 
                fraseNueva += event.results[i][0].transcript; 
            }
            textoAcumulado += fraseNueva + " ";
            // Cada vez que terminas una frase, la procesa y acomoda
            distribuirTextoInteligente(textoAcumulado);
        };
        
        recognition.onerror = () => { 
            btnDictar.innerHTML = "🎙️ Dictado Inteligente (Autocompletar)"; 
            btnDictar.classList.remove('grabando'); dictando = false; 
        };
        
        btnDictar.addEventListener('click', () => {
            if (!dictando) { 
                recognition.start(); 
                btnDictar.innerHTML = "⏹️ Detener grabación"; 
                btnDictar.classList.add('grabando'); 
                dictando = true; 
            } else { 
                recognition.stop(); 
                btnDictar.innerHTML = "🎙️ Dictado Inteligente (Autocompletar)"; 
                btnDictar.classList.remove('grabando'); 
                dictando = false; 
            }
        });
    } else { 
        btnDictar.style.display = 'none'; 
    }

    // --- MAGIA: FUNCIÓN QUE REPARTE EL TEXTO ---
    function distribuirTextoInteligente(textoTotal) {
        const txt = textoTotal.toLowerCase();
        
        // Diccionario de palabras que el sistema va a buscar
        const diccionario = [
            { id: 'cama', palabras: ['cama ', 'habitación ', 'habitacion '] },
            { id: 'paciente', palabras: ['paciente '] },
            { id: 'medicamento', palabras: ['medicamento ', 'medicamentos '] },
            { id: 'dosis', palabras: ['dosis '] },
            { id: 'horarios', palabras: ['horario ', 'horarios '] },
            { id: 'pendientes', palabras: ['pendiente ', 'pendientes ', 'nota ', 'notas '] }
        ];

        let posiciones = [];

        // Buscar en dónde dijiste cada palabra
        diccionario.forEach(categoria => {
            let mejorIndice = -1;
            let longitud = 0;
            
            categoria.palabras.forEach(palabra => {
                let idx = txt.indexOf(palabra);
                if (idx !== -1 && (mejorIndice === -1 || idx < mejorIndice)) {
                    mejorIndice = idx;
                    longitud = palabra.length;
                }
            });

            if (mejorIndice !== -1) {
                posiciones.push({ id: categoria.id, index: mejorIndice, length: longitud });
            }
        });

        // Ordenar las palabras en el orden en que las hablaste
        posiciones.sort((a, b) => a.index - b.index);

        // Si no dijiste ninguna palabra clave, manda todo a la caja de pendientes normal
        if (posiciones.length === 0) {
            document.getElementById('pendientes').value = textoTotal;
            return;
        }

        // Limpiar las cajas
        ['cama', 'paciente', 'medicamento', 'dosis', 'horarios', 'pendientes'].forEach(id => {
            document.getElementById(id).value = '';
        });

        // Cortar y repartir a cada cajita
        for (let i = 0; i < posiciones.length; i++) {
            let actual = posiciones[i];
            let siguiente = posiciones[i + 1];
            
            let inicio = actual.index + actual.length;
            let fin = siguiente ? siguiente.index : txt.length;
            
            let textoExtraido = textoTotal.substring(inicio, fin).trim();
            
            if (textoExtraido) {
                // Poner mayúscula al principio
                textoExtraido = textoExtraido.charAt(0).toUpperCase() + textoExtraido.slice(1);
                document.getElementById(actual.id).value = textoExtraido;
            }
        }
    }

    // --- FUNCIONES QUE YA TENÍAS ---
    function enviarReporte() {
        const cama = document.getElementById('cama').value;
        const paciente = document.getElementById('paciente').value;
        const medicamento = document.getElementById('medicamento').value;
        const dosis = document.getElementById('dosis').value;
        const horarios = document.getElementById('horarios').value;
        const notas = document.getElementById('pendientes').value;
        const btnEnviar = document.getElementById('btn-enviar');
        
        if(!cama || !paciente) { alert("Mínimo debes llenar la cama y el paciente."); return; }

        btnEnviar.innerHTML = "⏳ Guardando..."; btnEnviar.disabled = true;

        const formData = new FormData();
        formData.append('action', 'create'); 
        formData.append('cama', cama);
        formData.append('paciente', paciente);
        formData.append('medicamento', medicamento);
        formData.append('dosis', dosis);
        formData.append('horarios', horarios);
        formData.append('pendientes', notas);

        fetch(URL_GOOGLE, { method: 'POST', body: formData, mode: 'no-cors' })
        .then(() => {
            document.querySelectorAll('input[type="text"], textarea').forEach(el => el.value = '');
            textoAcumulado = ""; // Limpia la memoria del dictado
            btnEnviar.innerHTML = "Guardar en Expediente"; btnEnviar.disabled = false;
            setTimeout(() => cargarPendientes(false), 1500); 
        }).catch(err => { alert("Error al guardar."); btnEnviar.disabled = false; });
    }

    function marcarResuelto(rowId, boton) {
        if(!confirm("¿Confirmas que este pendiente fue atendido?")) return;
        
        boton.innerHTML = "⏳ Completando...";
        boton.disabled = true;
        boton.parentElement.style.opacity = '0.5';

        const formData = new FormData();
        formData.append('action', 'update'); 
        formData.append('row', rowId); 

        fetch(URL_GOOGLE, { method: 'POST', body: formData, mode: 'no-cors' })
        .then(() => {
            setTimeout(() => cargarPendientes(false), 1000); 
        }).catch(err => { alert("Error al actualizar."); boton.disabled = false; boton.parentElement.style.opacity = '1';});
    }

    function cargarPendientes(esFondo = true) {
        const contenedor = document.getElementById('lista-pendientes');
        if (!esFondo) contenedor.innerHTML = '<p style="text-align:center; color:#7f8c8d; font-size: 14px;">⏳ Sincronizando sala...</p>';

        fetch(URL_GOOGLE)
        .then(response => response.json())
        .then(data => {
            if(data.length === 0) {
                contenedor.innerHTML = '<p style="text-align:center; color:#27ae60; font-weight:600; padding: 20px; background: #e8f8f5; border-radius: 8px;">✔️ Sala al día. No hay pendientes.</p>';
                return;
            }

            let nuevoHTML = '';
            data.reverse().forEach(item => {
                nuevoHTML += `
                    <div class="tarjeta-pendiente">
                        <div class="tarjeta-header">
                            <span class="t-cama">🛏️ ${item.cama}</span>
                            <span class="t-paciente">👤 ${item.paciente}</span>
                        </div>
                        <div class="t-grid">
                            ${item.medicamento ? `<div class="t-info"><strong>Medicamento</strong>${item.medicamento}</div>` : ''}
                            ${item.dosis ? `<div class="t-info"><strong>Dosis</strong>${item.dosis}</div>` : ''}
                            ${item.horarios ? `<div class="t-info" style="grid-column: span 2;"><strong>Horarios</strong>${item.horarios}</div>` : ''}
                        </div>
                        ${item.pendientes ? `<div class="t-notas"><strong>Pendientes:</strong><br>${item.pendientes}</div>` : ''}
                        
                        <button class="btn-resolver" onclick="marcarResuelto(${item.row}, this)">✓ Marcar como atendido</button>
                    </div>
                `;
            });
            contenedor.innerHTML = nuevoHTML;
        }).catch(error => {
            if (!esFondo) contenedor.innerHTML = '<p style="text-align:center; color:#e74c3c;">❌ Error de conexión.</p>';
        });
    }

    window.onload = () => {
        cargarPendientes(false);
        setInterval(() => cargarPendientes(true), 15000);
    };
</script>

</body>
</html>
