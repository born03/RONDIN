<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente Clínico Seguro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #eef2f5; margin: 0; padding: 15px; display: flex; justify-content: center; color: #2c3e50;}
        .container { background-color: #ffffff; padding: 25px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); width: 100%; max-width: 500px; transition: max-width 0.3s ease; }
        h2 { color: #0056b3; text-align: center; margin-top: 0; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 8px;}
        h3 { color: #34495e; text-align: center; font-size: 18px; margin-top: 0;}
        .main-layout { display: flex; flex-direction: column; gap: 0; }
        .form-section { width: 100%; }
        .historial-seccion { margin-top: 35px; border-top: 2px solid #ecf0f1; padding-top: 25px; width: 100%; }
        .form-group { margin-bottom: 12px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        label { font-weight: 600; color: #5c6a79; font-size: 13px; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.5px;}
        input[type="text"], textarea, select { width: 100%; padding: 12px; border: 1.5px solid #dce4ec; border-radius: 10px; box-sizing: border-box; font-size: 15px; background-color: #fbfcff; }
        input[type="text"]:focus, textarea:focus, select:focus { border-color: #0056b3; outline: none; box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1); }
        textarea { resize: vertical; min-height: 90px; }
        .caja-medicamentos { background-color: #f8fafd; border: 1.5px dashed #b8daff; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .titulo-caja { font-size: 14px; font-weight: bold; color: #0056b3; margin-bottom: 10px; margin-top: 0;}
        .btn-add-med { background-color: #e8f4fd; color: #0056b3; border: 1px solid #b8daff; padding: 10px; width: 100%; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .item-med { background: #fff; border: 1px solid #dce4ec; padding: 8px 10px; border-radius: 6px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; font-family: monospace; font-size: 14px;}
        .btn-quitar { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; font-weight: bold; padding: 0 5px; }
        .botones-accion { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
        .btn-accion { background-color: #e8f4fd; color: #0056b3; border: 1.5px solid #b8daff; padding: 12px; width: 100%; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px;}
        .btn-enviar { background-color: #0056b3; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .tarjeta-pendiente { background-color: #ffffff; border: 1px solid #e1e8ed; border-left: 5px solid #e67e22; padding: 16px; margin-bottom: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .t-cama { font-size: 20px; font-weight: 800; color: #0056b3; }
        .t-paciente { font-size: 15px; color: #34495e; font-weight: 600; }
        .t-notas, .t-horarios { font-size: 14px; padding: 12px; border-radius: 8px; margin-top: 10px; white-space: pre-line; border-left: 3px solid #ccc; }
        .t-horarios { background: #f8f9fa; font-family: monospace; border-left-color: #3498db; }
        .t-notas { background: #fffcf5; border-left-color: #f1c40f; }
        .acciones-tarjeta { display: flex; gap: 10px; margin-top: 15px; }
        .btn-resolver { flex: 2; background: white; color: #27ae60; border: 1.5px solid #2ecc71; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-copiar { flex: 1; background: #f8f9fa; color: #34495e; border: 1.5px solid #bdc3c7; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #foto-input { display: none; }
        .indicador-vivo { font-size: 12px; color: #27ae60; text-align: center; margin-bottom: 15px; font-weight: bold;}
        
        @media (min-width: 900px) {
            body { padding: 20px; }
            .container { max-width: 1300px; padding: 30px; }
            .main-layout { flex-direction: row-reverse; gap: 40px; align-items: flex-start; }
            .form-section { flex: 0 0 380px; position: sticky; top: 30px; background: #f8fafd; padding: 20px; border-radius: 12px; border: 1px solid #e1e8ed;}
            .historial-seccion { flex: 1; margin-top: 0; }
            h3 { text-align: left; font-size: 24px; color: #0056b3; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; margin-bottom: 20px;}
            .indicador-vivo { text-align: left; margin-top: -15px; margin-bottom: 20px;}
            #lista-pendientes { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; }
        }
    </style>
</head>
<body>

<datalist id="diccionario-meds">
    <option value="AC. FOLINICO"><option value="AC. VALPROICO"><option value="ACICLOVIR">
    <option value="ALBUMINA"><option value="AMIKACINA"><option value="AMPICILINA">
    <option value="ANFOTERICINA B CONV"><option value="ANFOTERICINA B LIP"><option value="BENCILPENICILINA">
    <option value="BUMETANIDA"><option value="BUPRENORFINA"><option value="BUTILHIOSCINA">
    <option value="CAFEINA CITRATO"><option value="CASPOFUNGINA"><option value="CEFALOTINA">
    <option value="CEFEPIMA"><option value="CEFOTAXIMA"><option value="CEFTAZIDIMA">

    <option value="CLARITROMICINA"><option value="CLINDAMICINA"><option value="CLOROPIRAMINA">
    <option value="COLISTIMETATO"><option value="DEXAMETASONA"><option value="DEXAMETASONA DEPOT">
    <option value="DEXMEDETOMIDINA"><option value="DICLOFENACO"><option value="DIFENHIDRAMINA">
    <option value="DIFENIDOL"><option value="ENOXAPARINA"><option value="ERITROPOYETINA">
    <option value="ETAMSILATO"><option value="FENITOINA"><option value="FILGRASTIM">
    <option value="FITOMENADIONA"><option value="FLUCONAZOL"><option value="FOSAPREPITANT">
    <option value="FOSFOMICINA"><option value="FUROSEMIDA"><option value="GANCICLOVIR">
    <option value="GENTAMICINA"><option value="HEPARINA"><option value="HIDRALAZINA">
    <option value="HIDROCORTISONA"><option value="KETOROLACO"><option value="IBUPROFENO">
    <option value="LEVETIRACETAM"><option value="LEVOFLOXACINO"><option value="LINEZOLID">
    <option value="MEROPENEM"><option value="METAMIZOL"><option value="METILPREDNISOLONA">
    <option value="METOCLOPRAMIDA"><option value="METRONIDAZOL"><option value="OCTREOTIDA">
    <option value="OMEPRAZOL"><option value="ONDANSETRON"><option value="PARACETAMOL">
    <option value="PIPERACILINA"><option value="SOMATROPINA"><option value="TEICOPLANINA">
    <option value="TIAMINA"><option value="TIGECICLINA"><option value="TRAMADOL">
    <option value="TRIMETOPRIM"><option value="VANCOMICINA"><option value="VORICONAZOL">
</datalist>

<datalist id="diccionario-horarios">
    <option value="10-18-02">
    <option value="06-14-22">
    <option value="08-16-24">
    <option value="18-24-06-12">
    <option value="10-16-22-04">
    <option value="08-14-20-02">
    <option value="10-22">
    <option value="12-24">
    <option value="08-20">
    <option value="24 HRS">
    <option value="PRN">
    <option value="DOSIS ÚNICA">
</datalist>

<div class="container">
    <div class="main-layout">
        <div class="form-section">
            <h2 id="titulo-dinamico" class="titulo-pc" style="display:none;">🏥 Nuevo Ingreso</h2>
            <div class="botones-accion">
                <button id="btn-dictar" class="btn-accion">🎙️ Dictar</button>
                <button class="btn-accion" onclick="document.getElementById('foto-input').click()">📷 Escanear Foto</button>
                <input type="file" id="foto-input" accept="image/*" capture="environment">
            </div>
            
            <div class="info-dictado" style="margin-top:8px;">💡 Tip: Di <b>"Medicamento Paracetamol 500 miligramos intravenoso 10 18 2"</b> de corrido.</div>

            <div class="grid-form" style="margin-top: 15px;">
                <div class="form-group">
                    <label>Cama</label>
                    <input type="text" id="cama" placeholder="Ej. 302" oninput="window.guardarBorrador()">
                </div>
                <div class="form-group">
                    <label>Paciente</label>
                    <input type="text" id="paciente" placeholder="Nombre" oninput="window.guardarBorrador()">
                </div>
            </div>

            <div class="caja-medicamentos">
                <p class="titulo-caja">💊 Indicaciones</p>
                <div class="grid-form">
                    <div class="form-group full-width">
                        <label>Medicamento</label>
                        <input type="text" id="medicamento" list="diccionario-meds" placeholder="Buscar o dictar todo junto..." oninput="window.guardarBorrador()" style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label>Dosis</label>
                        <input type="text" id="dosis" placeholder="Ej. 150 MG" oninput="window.guardarBorrador()" style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label>Vía</label>
                        <select id="via" onchange="window.guardarBorrador()">
                            <option value="IV">IV</option><option value="VO">VO</option><option value="IM">IM</option>
                            <option value="SC">SC</option><option value="SL">SL</option><option value="INHAL">INHAL</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label>Horarios</label>
                        <input type="text" id="horarios" list="diccionario-horarios" placeholder="Toca para opciones..." oninput="window.guardarBorrador()">
                    </div>
                </div>
                <button type="button" class="btn-add-med" onclick="window.agregarMedicamento()">➕ Añadir a la lista</button>
                <ul id="lista-med-temporal" class="lista-temporal"></ul>
            </div>

            <div class="form-group full-width">
                <label>Observaciones</label>
                <textarea id="pendientes" placeholder="Dictado libre aquí..." oninput="window.guardarBorrador()"></textarea>
            </div>

            <button id="btn-enviar" class="btn-enviar" onclick="window.enviarReporte()">💾 Guardar en Nube</button>
            <div id="aviso-guardado" style="font-size:11px; color:#27ae60; text-align:center; margin-top:5px; display:none;">Borrador guardado...</div>
        </div>

        <div class="historial-seccion">
            <h2 class="titulo-movil">🏥 Expediente Seguro</h2>
            <h3>📋 Casos Activos en Sala</h3>
            <div class="indicador-vivo">🟢 Conectado en Tiempo Real</div>
            <div id="lista-pendientes"><p style="text-align:center; color:#7f8c8d;">Conectando...</p></div>
        </div>
    </div>
</div>

<script>
    if (window.innerWidth >= 900) {
        document.querySelector('.titulo-pc').style.display = 'block';
        document.querySelector('.titulo-movil').style.display = 'none';
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // LLAVES DE FIREBASE INTACTAS
    const firebaseConfig = {
      apiKey: "AIzaSyCc-UHGtHTHmjT0_EmPY7ozvw7uxI_tsVg",
      authDomain: "rondinhp-239a4.firebaseapp.com",
      databaseURL: "https://rondinhp-239a4-default-rtdb.firebaseio.com",
      projectId: "rondinhp-239a4",
      storageBucket: "rondinhp-239a4.firebasestorage.app",
      messagingSenderId: "383767424884",
      appId: "1:383767424884:web:e24192f8373ed096f30621"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const pacientesRef = collection(db, "pacientes");

    // LECTURA EN TIEMPO REAL
    onSnapshot(query(pacientesRef), (snapshot) => {
        const contenedor = document.getElementById('lista-pendientes');
        let activos = [];
        
        snapshot.forEach(d => { 
            if(d.data().estado === "Activo") activos.push({id: d.id, ...d.data()}); 
        });
        
        activos.sort((a,b) => (b.fecha?.toMillis() || 0) - (a.fecha?.toMillis() || 0));
        
        if(!activos.length) { 
            contenedor.innerHTML = '<p style="text-align:center; padding:20px; font-weight:bold; color:#27ae60; background:#e8f8f5; border-radius:8px;">✔️ SALA AL DÍA</p>'; 
            return; 
        }

        contenedor.innerHTML = activos.map(item => `
            <div class="tarjeta-pendiente">
                <div class="tarjeta-header">
                    <span class="t-cama">🛏️ ${item.cama || 'S/N'}</span>
                    <span class="t-paciente">👤 ${item.paciente || 'S/N'}</span>
                </div>
                ${item.columnaHorarios ? `<div class="t-horarios"><strong>HORARIOS:</strong><br>${item.columnaHorarios.replace(/\n/g, '<br>')}</div>` : ''}
                ${item.pendientes ? `<div class="t-notas"><strong>OBSERVACIONES:</strong><br>${item.pendientes.replace(/\n/g, '<br>')}</div>` : ''}
                <div class="acciones-tarjeta">
                    <button class="btn-resolver" onclick="window.marcarResuelto('${item.id}', this)">✓ Atendido</button>
                    <button class="btn-copiar" onclick="window.copiarTabla(this, '${encodeURIComponent(JSON.stringify(item))}')">📋 Copiar a Excel</button>
                </div>
            </div>
        `).join('');
    });

    // COPIAR A EXCEL 
    window.copiarTabla = function(boton, data) {
        const item = JSON.parse(decodeURIComponent(data));
        const horariosExcel = item.columnaHorarios ? `"${item.columnaHorarios.replace(/"/g, '""')}"` : '""';
        const obsExcel = item.pendientes ? `"${item.pendientes.replace(/"/g, '""')}"` : '""';
        const texto = `${item.cama || ''}\t${item.paciente || ''}\t${horariosExcel}\t${obsExcel}`;
        
        navigator.clipboard.writeText(texto).then(() => {
            const temp = boton.innerHTML;
            boton.innerHTML = "✅ ¡Copiado!"; 
            setTimeout(() => boton.innerHTML = temp, 2000);
        }).catch(() => alert("Tu navegador bloqueó el portapapeles."));
    };

    // GUARDAR EN FIREBASE
    window.enviarReporte = async function() {
        const cama = document.getElementById('cama').value;
        const paciente = document.getElementById('paciente').value;
        const notas = document.getElementById('pendientes').value;
        
        window.agregarMedicamento();
        if(!cama && !paciente && !window.medicamentosArray.length && !notas) return;
        
        const btn = document.getElementById('btn-enviar');
        btn.disabled = true; btn.innerHTML = "⏳ Guardando...";
        
        const bloque = window.medicamentosArray.map(m => m.textoFinal).join('\n');

        try {
            await addDoc(pacientesRef, {
                cama, paciente, columnaHorarios: bloque, pendientes: notas, estado: "Activo", fecha: serverTimestamp()
            });
            document.querySelectorAll('input[type="text"], textarea').forEach(i => i.value = '');
            document.getElementById('via').value = 'IV';
            window.medicamentosArray = []; window.renderizarListaMeds();
            localStorage.removeItem('borradorRondines');
        } catch (e) { alert(e.message); }
        btn.disabled = false; btn.innerHTML = "💾 Guardar en Nube";
    };

    // MARCAR COMO RESUELTO
    window.marcarResuelto = async (id, b) => {
        if(confirm("¿Confirmas que el paciente ha sido atendido?")) {
            b.disabled = true;
            b.innerHTML = "⏳ Actualizando...";
            await updateDoc(doc(db, "pacientes", id), { estado: "Resuelto", fechaResolucion: serverTimestamp() });
        }
    };

    // ==========================================
    // MAGIA: LÓGICA DE TEXTO Y MEDICAMENTOS
    // ==========================================
    window.medicamentosArray = [];
    window.agregarMedicamento = () => {
        const med = document.getElementById('medicamento').value.trim().toUpperCase();
        const dos = document.getElementById('dosis').value.trim().toUpperCase();
        const via = document.getElementById('via').value;
        const hor = document.getElementById('horarios').value.trim().toUpperCase();
        if(!med && !dos && !hor) return;

        let textoFinal = "";
        
        // Si el usuario dictó todo de corrido en la caja de medicamento y no usó dosis ni horarios
        if (dos === '' && hor === '') {
            // Revisamos si ya mencionó la vía IV/VO en su frase
            if (/\b(IV|VO|IM|SC|SL|INHAL|TOPICA)\b/.test(med)) {
                textoFinal = med; // Ya viene con la vía en el texto
            } else {
                textoFinal = `${med} ${via}`; // Le agregamos la vía del botón por si acaso
            }
        } else {
            // Formato normal ensamblado
            textoFinal = `${med} ${dos} ${via} ${hor}`;
        }
        
        // Limpiamos los espacios múltiples
        textoFinal = textoFinal.replace(/\s+/g, ' ').trim();

        window.medicamentosArray.push({ textoFinal });
        ['medicamento','dosis','horarios'].forEach(i => document.getElementById(i).value = '');
        document.getElementById('via').value = 'IV';
        window.renderizarListaMeds(); window.guardarBorrador();
    };

    window.renderizarListaMeds = () => {
        document.getElementById('lista-med-temporal').innerHTML = window.medicamentosArray.map((m,i) => `
            <li class="item-med"><span>${m.textoFinal}</span>
            <button class="btn-quitar" onclick="window.quitarMedicamento(${i})">×</button></li>
        `).join('');
    };

    window.quitarMedicamento = (i) => { window.medicamentosArray.splice(i,1); window.renderizarListaMeds(); window.guardarBorrador(); };

    window.guardarBorrador = () => {
        const data = {
            cama: document.getElementById('cama').value, paciente: document.getElementById('paciente').value,
            med: document.getElementById('medicamento').value, dos: document.getElementById('dosis').value,
            via: document.getElementById('via').value, hor: document.getElementById('horarios').value,
            obs: document.getElementById('pendientes').value, lista: window.medicamentosArray
        };
        localStorage.setItem('borradorRondines', JSON.stringify(data));
        document.getElementById('aviso-guardado').style.display = 'block';
        setTimeout(() => document.getElementById('aviso-guardado').style.display = 'none', 2000);
    };

    const b = JSON.parse(localStorage.getItem('borradorRondines'));
    if(b) {
        document.getElementById('cama').value = b.cama || ''; document.getElementById('paciente').value = b.paciente || '';
        document.getElementById('medicamento').value = b.med || ''; document.getElementById('dosis').value = b.dos || '';
        document.getElementById('via').value = b.via || 'IV'; document.getElementById('horarios').value = b.hor || '';
        document.getElementById('pendientes').value = b.obs || ''; window.medicamentosArray = b.lista || [];
        window.renderizarListaMeds();
    }

    // TESSERACT (FOTOS)
    document.getElementById('foto-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const btn = document.querySelector('button[onclick="document.getElementById(\'foto-input\').click()"]');
        const temp = btn.innerHTML;
        btn.innerHTML = "⏳ Extrayendo..."; btn.disabled = true;
        Tesseract.recognize(file, 'spa').then(({ data: { text } }) => {
            if (text.trim()) {
                document.getElementById('pendientes').value += "\n📄 [ESCANEADO]:\n" + text.trim();
                window.guardarBorrador();
            } else alert("No se encontró texto.");
            btn.innerHTML = temp; btn.disabled = false;
        }).catch(() => { alert("Error al leer la imagen."); btn.innerHTML = temp; btn.disabled = false; });
    });

    // ==========================================
    // TRADUCTOR MÉDICO INTELIGENTE Y DICTADO
    // ==========================================
    function formatearDictadoMedico(texto) {
        let t = texto.toLowerCase();
        
        // Traductor de palabras médicas a abreviaturas
        t = t.replace(/miligramos/g, 'MG');
        t = t.replace(/gramos/g, 'G');
        t = t.replace(/unidades/g, 'UI');
        t = t.replace(/intravenos[oa]/g, 'IV');
        t = t.replace(/\bi v\b/g, 'IV');
        t = t.replace(/por vía oral/g, 'VO');
        t = t.replace(/vía oral/g, 'VO');
        t = t.replace(/\boral\b/g, 'VO');
        t = t.replace(/\bv o\b/g, 'VO');
        t = t.replace(/intramuscular/g, 'IM');
        t = t.replace(/subcutáne[oa]/g, 'SC');

        // Formateador Mágico de Horarios: "10 18 2" -> "10-18-02"
        // Busca 4 números seguidos
        t = t.replace(/\b(\d{1,2})\s+(?:y\s+)?(\d{1,2})\s+(?:y\s+)?(\d{1,2})\s+(?:y\s+)?(\d{1,2})\b/g, (m,a,b,c,d) => `${a.padStart(2,'0')}-${b.padStart(2,'0')}-${c.padStart(2,'0')}-${d.padStart(2,'0')}`);
        // Busca 3 números seguidos
        t = t.replace(/\b(\d{1,2})\s+(?:y\s+)?(\d{1,2})\s+(?:y\s+)?(\d{1,2})\b/g, (m,a,b,c) => `${a.padStart(2,'0')}-${b.padStart(2,'0')}-${c.padStart(2,'0')}`);
        // Busca 2 números (Solo si parecen horas reales menores o iguales a 24)
        t = t.replace(/\b(\d{1,2})\s+(?:y\s+)?(\d{1,2})\b/g, (m,a,b) => {
            if(Number(a) <= 24 && Number(b) <= 24) return `${a.padStart(2,'0')}-${b.padStart(2,'0')}`;
            return m;
        });
        
        return t;
    }

    const sr = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(sr) {
        const rec = new sr(); rec.lang = 'es-MX'; rec.continuous = true;
        rec.onresult = e => {
            let rawText = ""; 
            for(let i=e.resultIndex; i<e.results.length; i++) rawText += e.results[i][0].transcript;
            
            // Pasamos el texto por nuestro filtro médico inteligente
            let t = formatearDictadoMedico(rawText);
            distribuir(t); 
            window.guardarBorrador();
        };
        document.getElementById('btn-dictar').onclick = () => {
            if(window.dictando) { rec.stop(); window.dictando=false; document.getElementById('btn-dictar').innerHTML="🎙️ Dictar"; }
            else { rec.start(); window.dictando=true; document.getElementById('btn-dictar').innerHTML="🛑 Parar"; }
        };
    }

    function distribuir(t) {
        const low = t.toLowerCase();
        const dic = [
            {id:'cama', p:['cama','habitación']}, {id:'paciente', p:['paciente']},
            {id:'medicamento', p:['medicamento']}, {id:'dosis', p:['dosis']},
            {id:'horarios', p:['horario', 'cada']}, {id:'pendientes', p:['observación','observaciones','pendiente','pendientes','nota','notas']}
        ];
        
        let pos = [];
        dic.forEach(c => {
            let idx = -1; let l = 0;
            c.p.forEach(p => { let i = low.indexOf(p); if(i!==-1&&(idx===-1||i<idx)) {idx=i; l=p.length;} });
            if(idx!==-1) pos.push({id:c.id, idx, l});
        });
        pos.sort((a,b) => a.idx - b.idx);
        
        // Si no usó ninguna palabra clave, lo manda todo a la caja de pendientes libremente
        if(!pos.length) { document.getElementById('pendientes').value += (document.getElementById('pendientes').value ? " " : "") + t; return; }
        
        // Limpiamos las cajas antes de repartir
        ['cama', 'paciente', 'medicamento', 'dosis', 'horarios', 'pendientes'].forEach(id => { document.getElementById(id).value = ''; });

        for(let i=0; i<pos.length; i++){
            let f = pos[i+1] ? pos[i+1].idx : t.length;
            let val = t.substring(pos[i].idx + pos[i].l, f).trim();
            if(val) {
                // Todo lo que sea medicina o dosis, lo forzamos a MAYÚSCULAS
                if (pos[i].id === 'medicamento' || pos[i].id === 'dosis' || pos[i].id === 'horarios') {
                    document.getElementById(pos[i].id).value = val.toUpperCase();
                } else {
                    document.getElementById(pos[i].id).value = val.charAt(0).toUpperCase() + val.slice(1);
                }
            }
        }
    }
</script>
</body>
</html>
